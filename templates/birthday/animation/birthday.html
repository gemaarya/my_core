<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a2e;
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'Georgia', serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* ---- STARS ---- */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.3; transform: scale(1); }
    to   { opacity: 1;   transform: scale(1.4); }
  }

  /* ---- MOON ---- */
  .moon {
    position: fixed;
    top: 40px; left: 20px;
    width: 100px; height: 100px;
    background: radial-gradient(circle at 35% 40%, #fff9c4, #ffd54f);
    border-radius: 50%;
    box-shadow: 0 0 30px 10px rgba(255, 213, 79, 0.3);
    z-index: 1;
    clip-path: ellipse(50% 50% at 50% 50%);
    /* Crescent illusion */
    overflow: hidden;
  }
  .moon::after {
    content: '';
    position: absolute;
    top: -10px; left: 15px;
    width: 90px; height: 90px;
    background: #0d0d35;
    border-radius: 50%;
  }

  /* ---- BALLOONS ---- */
  .balloons {
    position: fixed;
    top: 0; right: 0;
    width: 200px; height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  .balloon {
    position: absolute;
    border-radius: 50%;
    animation: floatBalloon 6s ease-in-out infinite;
  }
  .balloon::after {
    content: '';
    position: absolute;
    bottom: -40px;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 40px;
    background: rgba(255,255,255,0.4);
  }
  @keyframes floatBalloon {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50%       { transform: translateY(-20px) rotate(3deg); }
  }
  .b1 { width: 80px; height: 90px; background: radial-gradient(circle at 35% 30%, #90caf9, #1565c0); top: 30px; right: 60px; animation-delay: 0s; }
  .b2 { width: 70px; height: 80px; background: radial-gradient(circle at 35% 30%, #fff59d, #f9a825); top: 10px; right: 10px; animation-delay: 1s; }
  .b3 { width: 60px; height: 70px; background: radial-gradient(circle at 35% 30%, #ef9a9a, #c62828); top: 60px; right: 100px; animation-delay: 2s; }
  .b4 { width: 55px; height: 65px; background: radial-gradient(circle at 35% 30%, #ce93d8, #7b1fa2); top: 5px; right: 140px; animation-delay: 0.5s; }

  /* ---- MAIN CONTAINER ---- */
  .scene {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    width: 100vw;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ---- DECORATIVE STARS (large) ---- */
  .big-star {
    position: absolute;
    color: white;
    font-size: 28px;
    animation: pulse 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.2); }
  }
  .bs1 { top: 30%; left: 8%; animation-delay: 0s; }
  .bs2 { top: 55%; left: 5%; animation-delay: 1s; font-size: 18px; }
  .bs3 { top: 70%; left: 12%; animation-delay: 0.5s; font-size: 22px; }
  .bs4 { top: 20%; left: 15%; animation-delay: 1.5s; font-size: 14px; }
  .bs5 { top: 80%; left: 7%; animation-delay: 2s; font-size: 16px; }

  /* ---- HEART TREE ---- */
  .tree-wrap {
    position: relative;
    width: 260px;
    height: 340px;
    margin-bottom: -20px;
  }
  /* Trunk */
  .trunk {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 18px;
    height: 120px;
    background: linear-gradient(to top, #5d4037, #a1887f);
    border-radius: 8px;
  }
  /* Heart shape made of canvas hearts (confetti particles) */
  #heartCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 220px;
  }

  /* ---- CLICK BUTTON ---- */
  .click-btn {
    position: absolute;
    top: 48%;
    left: 20%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.4);
    color: white;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 11px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
    animation: clickPulse 2s ease-in-out infinite;
    z-index: 10;
  }
  .click-btn .heart-icon { color: #ff6b9d; font-size: 14px; }
  @keyframes clickPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 157, 0.4); }
    50%       { box-shadow: 0 0 0 8px rgba(255, 107, 157, 0); }
  }

  /* ---- COUNTER ---- */
  .since-wrap {
    text-align: center;
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    margin-top: 32px;
    padding-top: 10px;
  }
  .counter {
    display: flex;
    gap: 16px;
    align-items: baseline;
    justify-content: center;
    color: white;
    margin-bottom: 6px;
  }
  .cnt-val {
    font-size: 38px;
    font-weight: 700;
    font-family: 'Courier New', monospace;
    letter-spacing: -1px;
    color: #fff;
  }
  .cnt-label {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .cnt-dot {
    width: 6px; height: 6px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
  }

  /* ---- SCROLLING MESSAGES ---- */
  .messages {
    position: absolute;
    top: 40%;
    left: 5%;
    max-width: 160px;
    pointer-events: none;
  }
  .msg-line {
    color: rgba(255,255,255,0.9);
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    line-height: 1.8;
    animation: fadeScroll 8s linear infinite;
  }
  @keyframes fadeScroll {
    0%   { opacity: 0; transform: translateY(10px); }
    10%  { opacity: 1; transform: translateY(0); }
    80%  { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-10px); }
  }

  /* ---- CARD (shown on click) ---- */
  .card-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }
  .card-overlay.active { display: flex; }
  .card {
    background: linear-gradient(135deg, #fff8f0 0%, #fff 100%);
    border-radius: 20px;
    padding: 40px 30px;
    max-width: 320px;
    width: 90%;
    text-align: center;
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
    animation: cardPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  @keyframes cardPop {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .card h2 {
    font-size: 26px;
    color: #c62828;
    margin-bottom: 12px;
    font-family: 'Georgia', serif;
  }
  .card p {
    font-size: 14px;
    color: #555;
    line-height: 1.7;
    margin-bottom: 20px;
  }
  .card-hearts {
    font-size: 28px;
    margin-bottom: 16px;
    display: block;
    animation: bounceHearts 1s ease-in-out infinite;
  }
  @keyframes bounceHearts {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.15); }
  }
  .close-btn {
    background: linear-gradient(135deg, #e91e63, #c62828);
    color: white;
    border: none;
    padding: 10px 28px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 14px;
    letter-spacing: 1px;
  }
  .name-input-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .name-input {
    flex: 1;
    padding: 8px 14px;
    border: 2px solid #f48fb1;
    border-radius: 20px;
    font-size: 13px;
    outline: none;
    color: #333;
  }
  .name-input:focus { border-color: #e91e63; }
  .set-btn {
    background: #e91e63;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
  }

  /* ---- MUSIC BUTTON ---- */
  .music-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 200;
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.35);
    color: white;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    font-size: 22px;
    cursor: pointer;
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 18px rgba(255,107,157,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .music-btn:hover {
    transform: scale(1.12);
    box-shadow: 0 0 26px rgba(255,107,157,0.7);
  }
  .music-btn.playing {
    animation: musicPulse 1.2s ease-in-out infinite;
  }
  @keyframes musicPulse {
    0%, 100% { box-shadow: 0 0 18px rgba(255,107,157,0.4); }
    50%       { box-shadow: 0 0 32px rgba(255,107,157,0.9); }
  }

  /* ---- FLOATING CONFETTI ---- */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 50;
    animation: confettiFall linear infinite;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
/* ---- FOOTER ---- */
footer {
  position: fixed;
  bottom: 10px;
  left: 0;
  width: 100%;
  text-align: center;
  z-index: 199;
}
.footer-copy {
  font-size: 12px;
  color: #ffffff;
  letter-spacing: 1px;
}
</style>
</head>

<script>
// ---- Generate twinkling stars ----
const starsDiv = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 3 + 1;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    top:${Math.random()*100}%;
    left:${Math.random()*100}%;
    animation-delay:${Math.random()*3}s;
    animation-duration:${1.5+Math.random()*2}s;
  `;
  starsDiv.appendChild(s);
}

// ---- Heart-shaped confetti canvas ----
const canvas = document.getElementById('heartCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 260;
canvas.height = 220;

const COLORS = ['#e91e63','#ff6b9d','#ff8c42','#f9ca24','#6c5ce7','#a29bfe','#fd79a8','#ff7675','#fdcb6e','#00b894','#74b9ff'];

const hearts = [];
// Precompute heart positions in a heart shape
function heartXY(t) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
  return { x, y };
}

// Spawn hearts gradually
let spawnedCount = 0;
const MAX_HEARTS = 260;
const heartPositions = [];
for (let t = 0; t < Math.PI*2; t += 0.05) {
  for (let r = 0.4; r <= 1; r += 0.2) {
    const p = heartXY(t);
    heartPositions.push({
      tx: canvas.width/2 + p.x * r * 7,
      ty: canvas.height/2 - 10 + p.y * r * 7,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      size: Math.random() * 7 + 4,
      angle: Math.random() * Math.PI * 2,
      vx: (Math.random() - 0.5) * 2,
      vy: -Math.random() * 3 - 1,
      settled: false,
      x: canvas.width/2 + (Math.random()-0.5)*30,
      y: canvas.height + 10,
      alpha: 1,
    });
  }
}

// Shuffle
heartPositions.sort(() => Math.random() - 0.5);

function drawTinyHeart(cx, cy, size, angle, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-size/2, -size/2, -size, size/4, 0, size);
  ctx.bezierCurveTo(size, size/4, size/2, -size/2, 0, 0);
  ctx.fill();
  ctx.restore();
}

function animateTree() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (spawnedCount < heartPositions.length && frameCount % 2 === 0) {
    hearts.push(heartPositions[spawnedCount]);
    spawnedCount++;
  }

  for (const h of hearts) {
    if (!h.settled) {
      h.x += h.vx;
      h.y += h.vy;
      h.vy += 0.08; // slow fall effect toward target
      h.vx *= 0.99;
      // Check if near target
      const dx = h.tx - h.x, dy = h.ty - h.y;
      if (Math.abs(dx) < 4 && Math.abs(dy) < 4) {
        h.settled = true;
        h.x = h.tx; h.y = h.ty;
      } else {
        // Attract toward target
        h.vx += dx * 0.03;
        h.vy += dy * 0.03;
      }
      h.angle += 0.05;
    } else {
      // Subtle breathing
      h.angle += 0.005;
    }
    drawTinyHeart(h.x, h.y, h.size, h.angle, h.color, h.alpha);
  }

  requestAnimationFrame(animateTree);
  frameCount++;
}
let frameCount = 0;
animateTree();

// ---- Birthday counter ----
// You can change this birth date!
let birthDate = new Date('2005-04-20T00:00:00');

function updateCounter() {
  const now = new Date();
  const diff = now - birthDate;
  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
  document.getElementById('days').textContent = String(days).padStart(4,'0');
  document.getElementById('hours').textContent = String(hours).padStart(2,'0');
  document.getElementById('minutes').textContent = String(minutes).padStart(2,'0');
}
updateCounter();
setInterval(updateCounter, 10000);

// ---- Scrolling messages ----
const msgLines = [
  "HAPPIEST BIRTHDAY",
  "MY BEAUTIFUL ♡",
  "I'LL GIVE YOU ALL THE",
  "LOVE IN THE WORLD",
  "I MEAN EVERYTHING",
  "STAY AMAZING ALWAYS",
  "YOU ARE MY SUNSHINE ☀",
];
let msgIdx = 0;
const msgsDiv = document.getElementById('messages');

function showNextMessage() {
  msgsDiv.innerHTML = '';
  const lines = [msgLines[msgIdx % msgLines.length], msgLines[(msgIdx+1) % msgLines.length]];
  lines.forEach((txt, i) => {
    const d = document.createElement('div');
    d.className = 'msg-line';
    d.textContent = txt;
    d.style.animationDelay = (i * 0.3) + 's';
    msgsDiv.appendChild(d);
  });
  msgIdx++;
}
showNextMessage();
setInterval(showNextMessage, 4000);

// ---- Card logic ----
function openCard() {
  document.getElementById('cardOverlay').classList.add('active');
  launchConfetti();
}
function closeCard() {
  document.getElementById('cardOverlay').classList.remove('active');
}
function setName() {
  const name = document.getElementById('nameInput').value.trim();
  if (name) {
    document.getElementById('cardMsg').textContent =
      `Happy Birthday, ${name}! 🎉 May your day be as beautiful and wonderful as you are. You light up every room and every heart around you. Here's to you! 💖`;
    document.getElementById('btnLabel').textContent = name + ' ♡';
    document.getElementById('nameInput').value = '';
  }
}

// ---- Birthday Music (Web Audio API) ----
let audioCtx = null;
let musicPlaying = false;
let musicTimeout = null;
let musicNodes = [];

// Happy Birthday melody: [note, duration] where note is frequency in Hz
// 0 = rest
const HB_MELODY = [
  // "Happy Birthday to you"
  [261.6, 0.3],[261.6, 0.15],[293.7, 0.45],[261.6, 0.45],[349.2, 0.45],[329.6, 0.9],
  // "Happy Birthday to you"
  [261.6, 0.3],[261.6, 0.15],[293.7, 0.45],[261.6, 0.45],[392.0, 0.45],[349.2, 0.9],
  // "Happy Birthday dear ..."
  [261.6, 0.3],[261.6, 0.15],[523.3, 0.45],[440.0, 0.45],[349.2, 0.45],[329.6, 0.45],[293.7, 0.9],
  // "Happy Birthday to you"
  [466.2, 0.3],[466.2, 0.15],[440.0, 0.45],[349.2, 0.45],[392.0, 0.45],[349.2, 1.0],
];

function playNote(freq, startTime, duration) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, startTime);
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(0.22, startTime + 0.02);
  gain.gain.setValueAtTime(0.22, startTime + duration * 0.7);
  gain.gain.linearRampToValueAtTime(0, startTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
  musicNodes.push(osc);
}

function scheduleMelody() {
  if (!musicPlaying || !audioCtx) return;
  let t = audioCtx.currentTime + 0.05;
  for (const [freq, dur] of HB_MELODY) {
    playNote(freq, t, dur * 0.9);
    t += dur;
  }
  // Loop: schedule again just before melody ends
  const totalDur = HB_MELODY.reduce((s, n) => s + n[1], 0);
  musicTimeout = setTimeout(scheduleMelody, (totalDur - 0.2) * 1000);
}

}
and remove this below toggleMusic function */
function toggleMusic() {
  const btn = document.getElementById('musicBtn');
  if (!musicPlaying) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    musicPlaying = true;
    btn.textContent = '🔊';
    btn.classList.add('playing');
    scheduleMelody();
  } else {
    musicPlaying = false;
    clearTimeout(musicTimeout);
    // Stop all scheduled notes
    musicNodes.forEach(n => { try { n.stop(); } catch(e){} });
    musicNodes = [];
    btn.textContent = '🎵';
    btn.classList.remove('playing');
  }
}

function launchConfetti() {
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.cssText = `
      left:${Math.random()*100}vw;
      background:${COLORS[Math.floor(Math.random()*COLORS.length)]};
      width:${6+Math.random()*8}px;
      height:${6+Math.random()*8}px;
      border-radius:${Math.random()>0.5?'50%':'2px'};
      animation-duration:${2+Math.random()*3}s;
      animation-delay:${Math.random()*0.5}s;
    `;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5500);
  }
}

</script>
</body>
</html>
